<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REST CRUD Browser</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  body { font-size: 14px; background: #f5f6f8; }
  .main-wrap { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 280px; min-width: 280px; max-width: 280px;
    background: #fff; border-right: 1px solid #dee2e6;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-title {
    padding: 14px 16px 10px; font-weight: 700; font-size: 15px;
    border-bottom: 1px solid #dee2e6; display: flex; align-items: center; gap: 8px;
  }
  .sidebar-title i { color: #0d6efd; }
  .sidebar-filter { padding: 10px 12px; border-bottom: 1px solid #dee2e6; }
  .table-list { flex: 1; overflow-y: auto; padding: 4px 6px; }

  .table-item {
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1px; border: 1px solid transparent; font-size: 13px;
  }
  .table-item:hover { background: #f0f1f3; }
  .table-item.active { background: #e7f1ff; border-color: #b6d4fe; font-weight: 600; }
  .table-item .tname {
    font-family: 'SFMono-Regular', Consolas, monospace;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .table-item .tinfo {
    font-size: 11px; color: #6c757d; white-space: nowrap; margin-left: 8px;
  }
  .sidebar-footer {
    padding: 8px 14px; border-top: 1px solid #dee2e6;
    font-size: 11px; color: #6c757d;
  }

  /* Content */
  .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .content-header {
    padding: 14px 20px; background: #fff; border-bottom: 1px solid #dee2e6;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .content-header h5 { margin: 0; font-family: 'SFMono-Regular', Consolas, monospace; }

  .toolbar {
    padding: 10px 20px; background: #fff; border-bottom: 1px solid #dee2e6;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }

  .response-area { flex: 1; overflow: auto; padding: 16px 20px; }

  /* Table */
  .data-table { font-size: 13px; }
  .data-table th {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    font-weight: 600; color: #6c757d; cursor: pointer; user-select: none;
    white-space: nowrap; background: #f8f9fa; position: sticky; top: 0;
  }
  .data-table th:hover { color: #0d6efd; }
  .data-table td {
    font-family: 'SFMono-Regular', Consolas, monospace;
    font-size: 12px; max-width: 280px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .data-table tbody tr:hover { background: #e7f1ff !important; }

  /* Edit panel */
  .edit-panel {
    display: none; background: #fff; border-top: 2px solid #0d6efd;
    max-height: 50%; overflow-y: auto; padding: 20px;
  }
  .edit-panel.visible { display: block; }

  /* Loading */
  .loading-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(255,255,255,0.7); z-index: 10;
    align-items: center; justify-content: center;
  }
  .loading-overlay.visible { display: flex; }

  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: #6c757d; gap: 8px;
  }
  .empty-state i { font-size: 48px; opacity: 0.3; }

  .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; }
</style>
</head>
<body>

<div class="main-wrap">
  <!-- Sidebar: Tabellen -->
  <div class="sidebar">
    <div class="sidebar-title"><i class="bi bi-database"></i> Oracle Tabellen</div>
    <div class="sidebar-filter">
      <input type="text" class="form-control form-control-sm" id="tableFilter"
             placeholder="Tabelle filtern …" oninput="filterTables()" />
    </div>
    <div class="table-list" id="tableList">
      <div class="text-center text-muted p-4">
        <div class="spinner-border spinner-border-sm" role="status"></div> Laden …
      </div>
    </div>
    <div class="sidebar-footer" id="tableCount"></div>
  </div>

  <!-- Content -->
  <div class="content-area position-relative">
    <div class="loading-overlay" id="loader">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <i class="bi bi-table"></i>
      <p>Tabelle links auswählen</p>
    </div>

    <!-- Data View -->
    <div id="dataView" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div class="content-header">
        <h5 id="tableTitle"></h5>
        <div class="d-flex align-items-center gap-2">
          <span id="statusBar"></span>
          <button class="btn btn-sm btn-outline-secondary" onclick="refreshData()" title="Neu laden">
            <i class="bi bi-arrow-clockwise"></i>
          </button>
        </div>
      </div>

      <div class="toolbar">
        <div class="input-group input-group-sm" style="max-width:280px">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="text" class="form-control" id="searchInput" placeholder="Suchen …"
                 oninput="onSearchInput(this.value)" />
        </div>
        <div class="d-flex align-items-center gap-2 ms-auto">
          <small class="text-muted font-monospace" id="totalInfo"></small>
          <select class="form-select form-select-sm" style="width:auto" id="pageSizeSelect"
                  onchange="onPageSizeChange(+this.value)">
            <option value="10">10/Seite</option>
            <option value="20" selected>20/Seite</option>
            <option value="50">50/Seite</option>
            <option value="100">100/Seite</option>
          </select>
        </div>
      </div>

      <div class="response-area">
        <div id="tableContainer"></div>
        <nav class="d-flex justify-content-center align-items-center gap-2 mt-2" id="pagination"></nav>
      </div>

      <!-- Edit Panel -->
      <div class="edit-panel" id="editPanel">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="mb-0 text-primary" id="editTitle"><i class="bi bi-pencil-square"></i> Bearbeiten</h6>
          <button class="btn btn-sm btn-outline-secondary" onclick="closeEdit()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="row g-2" id="editGrid"></div>
        <div class="mt-3 d-flex justify-content-end gap-2">
          <button class="btn btn-sm btn-outline-secondary" onclick="closeEdit()">Abbrechen</button>
          <button class="btn btn-sm btn-primary" id="btnSave" onclick="saveEdit()">
            <span id="saveSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            <i class="bi bi-check-lg"></i> Speichern
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container">
  <div id="toast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastBody"></div>
      <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Config ──
const API_BASE = window.location.origin + '/crud';

// ── State ──
let allTables = [];
let currentTable = null;
let flatData = [];
let sortCol = null;
let sortDir = 'asc';
let currentPage = 1;
let pageSize = 20;
let searchTerm = '';
let serverTotal = 0;
let serverTotalPages = 0;
let editRow = null;
let pkColumn = null; // wird aus erster Spalte oder Daten erraten
let searchDebounce = null;

// ── Init ──
window.addEventListener('DOMContentLoaded', loadTables);

// ══════════════════════════════════════════════════════════════
//  Tabellen laden
// ══════════════════════════════════════════════════════════════
async function loadTables() {
  try {
    const resp = await fetch(API_BASE);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    allTables = await resp.json();
    renderTableList();
  } catch (e) {
    document.getElementById('tableList').innerHTML =
      `<div class="text-danger p-3" style="font-size:12px"><i class="bi bi-exclamation-triangle"></i> ${esc(e.message)}</div>`;
  }
}

function renderTableList() {
  const list = document.getElementById('tableList');
  const f = document.getElementById('tableFilter').value.toLowerCase();
  const filtered = allTables.filter(t => t.name.toLowerCase().includes(f));

  list.innerHTML = filtered.map(t => `
    <div class="table-item ${currentTable === t.name ? 'active' : ''}"
         onclick="selectTable('${esc(t.name)}')">
      <span class="tname">${esc(t.name)}</span>
      <span class="tinfo">${t.rows != null ? t.rows + ' rows' : ''} · ${t.columns} col</span>
    </div>
  `).join('') || '<div class="text-muted text-center p-3">Keine Tabellen gefunden</div>';

  document.getElementById('tableCount').textContent =
    filtered.length + ' / ' + allTables.length + ' Tabellen';
}

function filterTables() { renderTableList(); }

// ══════════════════════════════════════════════════════════════
//  Tabelle auswählen
// ══════════════════════════════════════════════════════════════
function selectTable(name) {
  currentTable = name;
  currentPage = 1;
  searchTerm = '';
  sortCol = null;
  sortDir = 'asc';
  flatData = [];
  editRow = null;
  pkColumn = null;

  document.getElementById('searchInput').value = '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('dataView').style.display = 'flex';
  document.getElementById('tableTitle').textContent = name;
  document.getElementById('editPanel').classList.remove('visible');

  renderTableList();
  loadData();
}

// ══════════════════════════════════════════════════════════════
//  Daten laden
// ══════════════════════════════════════════════════════════════
async function loadData() {
  if (!currentTable) return;
  showLoader(true);

  const params = new URLSearchParams();
  params.set('page', currentPage);
  params.set('pageSize', pageSize);
  if (searchTerm) params.set('search', searchTerm);
  if (sortCol) {
    params.set('sortBy', sortCol);
    params.set('sortDir', sortDir);
  }

  try {
    const resp = await fetch(`${API_BASE}/${encodeURIComponent(currentTable)}?${params}`);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();

    flatData = data.items || [];
    serverTotal = data.total || 0;
    serverTotalPages = data.totalPages || 1;
    currentPage = data.page || 1;

    // PK aus erster Spalte erraten (oft ID, oder erste Spalte)
    if (flatData.length > 0 && !pkColumn) {
      const cols = Object.keys(flatData[0]);
      pkColumn = cols.find(c => /^id$/i.test(c))
        || cols.find(c => /id$/i.test(c))
        || cols.find(c => /^pk/i.test(c))
        || cols[0];
    }

    showStatus(serverTotal + ' Datensätze');
    renderTable();
    renderPagination();
  } catch (e) {
    showStatus('Fehler: ' + e.message, true);
    document.getElementById('tableContainer').innerHTML =
      `<div class="alert alert-danger">${esc(e.message)}</div>`;
  }

  showLoader(false);
}

function refreshData() { loadData(); }

// ══════════════════════════════════════════════════════════════
//  Tabelle rendern
// ══════════════════════════════════════════════════════════════
function renderTable() {
  const container = document.getElementById('tableContainer');
  if (!flatData.length) {
    container.innerHTML = '<div class="text-muted p-3">Keine Daten</div>';
    return;
  }

  const cols = Object.keys(flatData[0]);

  container.innerHTML = `
    <div class="table-responsive border rounded">
    <table class="table table-hover table-sm data-table mb-0">
    <thead><tr>
      ${cols.map(c => {
        const arr = sortCol === c ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
        return `<th onclick="onSortClick('${esc(c)}')">${esc(c)}${arr}</th>`;
      }).join('')}
      <th style="width:50px"></th>
    </tr></thead><tbody>
    ${flatData.map((row, i) => `<tr>
      ${cols.map(c => `<td title="${esc(String(row[c] ?? ''))}">${esc(truncate(row[c]))}</td>`).join('')}
      <td><button class="btn btn-sm btn-outline-primary py-0 px-1" onclick="openEdit(${i})" title="Bearbeiten"><i class="bi bi-pencil"></i></button></td>
    </tr>`).join('')}
    </tbody></table></div>`;

  document.getElementById('totalInfo').textContent = serverTotal + ' Datensätze';
}

function renderPagination() {
  const pg = document.getElementById('pagination');
  pg.innerHTML = `
    <button class="btn btn-sm btn-outline-secondary" onclick="goToPage(1)" ${currentPage <= 1 ? 'disabled' : ''}><i class="bi bi-chevron-double-left"></i></button>
    <button class="btn btn-sm btn-outline-secondary" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}><i class="bi bi-chevron-left"></i></button>
    <small class="text-muted font-monospace">Seite ${currentPage} / ${serverTotalPages}</small>
    <button class="btn btn-sm btn-outline-secondary" onclick="goToPage(${currentPage + 1})" ${currentPage >= serverTotalPages ? 'disabled' : ''}><i class="bi bi-chevron-right"></i></button>
    <button class="btn btn-sm btn-outline-secondary" onclick="goToPage(${serverTotalPages})" ${currentPage >= serverTotalPages ? 'disabled' : ''}><i class="bi bi-chevron-double-right"></i></button>`;
}

// ══════════════════════════════════════════════════════════════
//  Interaktionen: Paging, Sort, Search
// ══════════════════════════════════════════════════════════════
function goToPage(p) {
  if (p < 1 || p > serverTotalPages) return;
  currentPage = p;
  loadData();
}

function onPageSizeChange(size) {
  pageSize = size;
  currentPage = 1;
  loadData();
}

function onSortClick(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  currentPage = 1;
  loadData();
}

function onSearchInput(val) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    searchTerm = val;
    currentPage = 1;
    loadData();
  }, 400);
}

// ══════════════════════════════════════════════════════════════
//  Edit
// ══════════════════════════════════════════════════════════════
function openEdit(idx) {
  const row = flatData[idx];
  if (!row) return;
  editRow = { ...row };

  const idVal = row[pkColumn];
  document.getElementById('editTitle').innerHTML =
    `<i class="bi bi-pencil-square"></i> ${esc(currentTable)} · ${esc(pkColumn)} = ${esc(String(idVal))}`;

  let html = '';
  for (const [key, val] of Object.entries(row)) {
    const v = val === null || val === undefined ? '' : (typeof val === 'object' ? JSON.stringify(val) : String(val));
    const isPk = key === pkColumn;
    html += `<div class="col-md-4 col-sm-6">
      <label class="form-label form-label-sm mb-0 ${isPk ? 'fw-bold text-primary' : 'text-muted'}">${esc(key)}${isPk ? ' (PK)' : ''}</label>
      <input type="text" class="form-control form-control-sm font-monospace" data-edit-key="${esc(key)}"
             value="${esc(v)}" ${isPk ? 'readonly tabindex="-1" style="background:#f8f9fa"' : ''} />
    </div>`;
  }
  document.getElementById('editGrid').innerHTML = html;
  const panel = document.getElementById('editPanel');
  panel.classList.add('visible');
  panel.scrollIntoView({ behavior: 'smooth' });
}

function closeEdit() {
  document.getElementById('editPanel').classList.remove('visible');
  editRow = null;
}

async function saveEdit() {
  if (!editRow || !currentTable || !pkColumn) return;
  toggleSpinner('saveSpinner', true);

  const idVal = editRow[pkColumn];
  const body = {};
  document.querySelectorAll('[data-edit-key]').forEach(el => {
    const key = el.dataset.editKey;
    if (key === pkColumn) return; // PK nicht mitsenden
    let v = el.value;
    // Versuche Zahlen/Booleans zu parsen
    if (v === '') v = null;
    else if (v === 'true') v = true;
    else if (v === 'false') v = false;
    else if (!isNaN(v) && v.trim() !== '') v = Number(v);
    body[key] = v;
  });

  try {
    const resp = await fetch(`${API_BASE}/${encodeURIComponent(currentTable)}/${encodeURIComponent(idVal)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(body)
    });
    if (resp.ok) {
      showToast('Gespeichert!', 'success');
      closeEdit();
      loadData();
    } else {
      const t = await resp.text();
      showToast('Fehler ' + resp.status + ': ' + t.substring(0, 120), 'danger');
    }
  } catch (e) {
    showToast('Fehler: ' + e.message, 'danger');
  }
  toggleSpinner('saveSpinner', false);
}

// ══════════════════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════════════════
function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function truncate(v, max = 80) {
  if (v === null || v === undefined) return '—';
  if (typeof v === 'object') v = JSON.stringify(v);
  const s = String(v); return s.length > max ? s.substring(0, max) + '…' : s;
}
function showLoader(on) { document.getElementById('loader').classList.toggle('visible', on); }
function toggleSpinner(id, on) { document.getElementById(id).classList.toggle('d-none', !on); }
function showStatus(text, isError) {
  document.getElementById('statusBar').innerHTML = isError
    ? `<span class="badge bg-danger font-monospace">${esc(text)}</span>`
    : `<span class="badge bg-success font-monospace">${esc(text)}</span>`;
}
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast'), body = document.getElementById('toastBody');
  el.className = 'toast align-items-center border-0 text-bg-' + type;
  body.textContent = msg;
  bootstrap.Toast.getOrCreateInstance(el, { delay: 3000 }).show();
}
</script>
</body>
</html>
